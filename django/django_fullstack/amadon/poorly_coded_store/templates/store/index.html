<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Amadon</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="w-[80%] mx-auto">
    <div class="overflow-x-auto mt-[10px]">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 pb-2 border-b border-gray-100">Amadon Store!</h1>
        
        <table class="w-full border-collapse border-2 border-black">
            <thead>
                <tr class="bg-[#cccccc] text-gray-900 font-bold">
                    <th class="py-3 px-[15px] text-left border-r-2 border-black w-1/3">Item</th>
                    <th class="py-3 px-[15px] text-left border-r-2 border-black w-1/4">Price</th>
                    <th class="py-3 px-[15px] text-left border-r-2 border-black w-1/4">Quantity</th>
                    <th class="py-3 px-[15px] text-left">Actions</th>
                </tr>
            </thead>
            
            <tbody>
                {% for product in all_products %}
                <tr class="{% if forloop.counter0|divisibleby:2 %}bg-white{% else %}bg-[#f1f2f6]{% endif %}">
                    
                    <td class="py-3 px-[15px] text-left border-r-2 border-black text-gray-800 font-medium">
                        {{ product.description }}
                    </td>
                    <td class="py-3 px-[15px] text-left border-r-2 border-black text-gray-700">
                        ${{ product.price }}
                    </td>
                    
                    <form action="/buy/" method="post" class="m-0">
                        {% csrf_token %}
                        <input type="hidden" name="product_id" value="{{ product.id }}">
                        
                        <td class="py-3 px-[15px] text-left border-r-2 border-black">
                            <select name="quantity" class="bg-white border border-gray-400 rounded px-2 py-1 text-sm">
                                <option value="1">1</option>              
                                <option value="2">2</option>              
                                <option value="3">3</option>              
                            </select>
                        </td>
                        <td class="py-3 px-[15px] text-left">
                            <button type="submit" class="bg-white font-semibold border-2 border-black px-4 py-1 text-sm shadow-[3px_3px_0px_black] hover:bg-gray-100 active:bg-gray-200 cursor-pointer">
                                Buy!
                            </button>
                        </td>
                    </form>

                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
