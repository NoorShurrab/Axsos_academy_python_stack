<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Show {{ show.id }}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="form-section">
        <div class="form_input">
    <h1>Edit Show {{ show.id }}</h1>
    <form action="/shows/{{ show.id }}/update" method="POST">
        {% csrf_token %}
        
        <div>
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" value="{{ show.title }}" required>
        </div>

        <div class="form_row">
            <div class="form-group">
                <label for="network">Network:</label>
                <input type="text" id="network" name="network" value="{{ show.network }}" required>
            </div>
            
            <div class="form-group">
                <label for="release_date">Release Date:</label>
                <input type="date" id="release_date" name="release_date" value="{{ show.release_date|date:'Y-m-d' }}" required>
            </div>
        </div>

        <div>
            <label for="description">Description:</label>
            <textarea id="description" name="description">{{ show.description }}</textarea>
        </div>
        
        <div class="btn">
            <button type="submit">Update</button>
            <a href="/shows/{{ show.id }}" style="display: block;">Go to Show</a>
        </div>
    </form>
    </div>
    <div class="link">
            <a href="/shows">Go Back</a>
        </div> 
    </div>
</body>
</html>
