<!--    1. Survey form that collects name, location, language, and an optional comment 
        2. Submits data via POST to /result using Django's csrf_token for security 
        3. Styled with a custom CSS file loaded via Django's static files system -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{page_title}}</title>
    <link rel="stylesheet" href="{% static 'style.css' %}"/> 
</head>
<body>
    <form action="/result" method="post" class="container">
        {% csrf_token %}
        <div class="basic">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div class="basic">
            <label for="location">Dojo Location:</label>
            <select id="location" name="location" >
                <option value="San Jose">San Jose</option>
                <option value="Seattle">Seattle</option>
                <option value="Los Angeles">Los Angeles</option>
                <option value="Chicago">Chicago</option>
            </select>
        </div>

        <div class="basic">
            <label for="language">Favorite Language:</label>
            <select id="language" name="language">
                <option value="Python">Python</option>
                <option value="JavaScript">JavaScript</option>
                <option value="Java">Java</option>
                <option value="C++">C++</option>
            </select>
        </div>

        <div>
            <label for="comment">Comment (optional):</label><br>
            <textarea id="comment" name="comment" rows="4" cols="50"></textarea>
        </div>

        <button type="submit" value="submit">Button</button>

    </form>
</body>
</html>
