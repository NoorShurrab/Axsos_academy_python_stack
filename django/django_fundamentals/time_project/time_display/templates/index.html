<!-- Displays the current date and time passed from views.py using Django template variables -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Display</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

    <div class="container">
        <div class="title">
            <h3>The current time and date:</h3>
        </div>
        <div class="time-box">
            <div class="date">{{ date }}</div>
            <div class="time">{{ time }}</div>
        </div>
    </div>

</body>
</html>
