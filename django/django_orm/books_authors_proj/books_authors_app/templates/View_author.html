<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ author.first_name }} - Details</title>
    <!-- Load Django static files tag to use-->
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="details-card">
        <h1>{{ author.first_name }} {{ author.last_name }}</h1>
        <p><strong>ID: {{ author.id }} </strong></p>
        <p><strong>Notes</strong> {{ author.notes }}</p>
        
        <h3>Books:</h3>
        <ul>
            {% for book in author.books.all %}
                <li>{{ book.title }}</li>
            {% endfor %}
        </ul>

        <form action="/authors/{{ author.id }}/add_book" method="POST">
            {% csrf_token %}
            <div class="add">
                <select name="book_id">
                    {% for book in available_books %}
                        <option value="{{ book.id }}">{{ book.title }}</option>
                    {% endfor %}
                </select>
                <button type="submit">Add</button>
            </div>
        </form>
        <br>
        <a href="/authors">Back to Authors</a>
    </div>
</body>
</html>
