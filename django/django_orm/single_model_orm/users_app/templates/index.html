<!-- Main template for the Users app — displays all users in a table and provides a form to add new ones. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Users</title>
    <!-- Load Django static files tag to use {% static %} -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body class="container">
<!-- --------------------------------------------------------
        Users Table
        Loops over all_users passed from the index view.
        Shows a fallback row if no users exist in the database.
    -------------------------------------------------------- -->
    <h1>All the Users</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Age</th>
                <th>Drop</th>
            </tr>
        </thead>
        <tbody>
            {% for user in all_users %}
            <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.first_name }} {{ user.last_name }}</td>
                <td>{{ user.email_address }}</td>
                <td>{{ user.age }}</td>
                <td>
                    <!-- Link triggers the delete_user view with the user's ID -->
                    <a href="/delete_user/{{ user.id }}">Delete</a>
                </td>
            </tr>
            <!-- Displayed only when all_users queryset is empty -->
            {% empty %}
            <tr>
                <td colspan="5" style="text-align: center;">No users found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <hr>

    <!-- --------------------------------------------------------
        Add User Form
        Submits POST data to /create_user.
        {% csrf_token %} is required by Django for form security.
    -------------------------------------------------------- -->
    <h2>Add a User</h2>
    <form action="/create_user" method="POST">
        {% csrf_token %} 
        <div class="all_input">
            <div class="form-group">
            <label>First Name</label>
            <input type="text" name="first_name" required>
        </div>
        <div class="form-group">
            <label>Last Name</label>
            <input type="text" name="last_name" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email_address" required>
        </div>
        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" required>
        </div>
        </div>
        <div class="btn-container">
            <button type="submit">Add</button>
        </div>
    </form>
</body>
</html>
