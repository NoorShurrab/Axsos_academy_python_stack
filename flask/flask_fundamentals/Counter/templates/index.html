<!-- This template displays the current counter value and      
    three buttons to interact with the session: 
    +2 increments, Reset zeros out,             
    Destroy clears the entire session    -->    
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{page_title}}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="container">
    <h1>Counter</h1>
    <p>{{count}} times</p>

    <a href="/add_two">+2</a>
    <a href="/reset">Reset</a>
    <a href="/destroy_session" class="btn">Destroy Session</a>
    
</body>
</html>
