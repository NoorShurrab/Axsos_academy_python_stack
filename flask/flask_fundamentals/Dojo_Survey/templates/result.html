<!-- This file receives variables from server.py:
    name, location, language, comment          
    and displays them in an organized layout. 
    Includes a Go Back button to return home.  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{page_title}}</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/style.css')}}"/>
</head>
<body>
    <div class="container">
        <h1>Submitted Info</h1>
        <ul>
            <li><span>Name:</span> {{name}}</li>
            <li><span>Dojo Location:</span> {{location}}</li>
            <li><span>Favorite Language:</span> {{language}}</li>
            <li><span>Comment:</span> {{comment}}</li>
        </ul>
        <div>
            <a class="btn" href="/">Go Back</a>
        </div>
    </div>
</body>
</html>
