<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playground</title>
    <style>
        h1 {
            text-align: center
        }
        .all {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 15px;
            flex-wrap: wrap;
        }
        .all .content {
            width: 300px;
            height: 300px;
        }
    </style>
</head>
<body>
    <h1>Welcome!</h1>
        <div class="all">
     {% for i in range(num) %}
        <div class="content" style="background-color: {{color}};"></div>
         {% endfor %}
        </div>
   
</body>
</html>
